            id: fixedLine
            _url: /service/fixedLine
    serviceProfileEntry:
      name: entry
      title: Service profile event
      contentType: application/json
      payload:
        allOf:
        - $ref: '#/components/schemas/entryEnvelope'
        - type: object
          properties:
            body:
