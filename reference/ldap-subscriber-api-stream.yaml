components:
  messages:
    ready:
      name: ready
      title: Initial replay complete
      summary: Marks the boundary between initial state replay and live change events.
      contentType: application/json
      payload:
        type: object
        additionalProperties: false
      examples:
      - name: readyExample
        summary: Sent once between initial replay and live changes.
        payload: {}
    realmEntry:
      name: entry
      title: Realm event
      contentType: application/json
      payload:
        allOf:
        - $ref: '#/components/schemas/entryEnvelope'
        - type: object
          properties:
            body:
              oneOf:
              - $ref: '#/components/schemas/realmBody'
              - $ref: '#/components/schemas/tombstone'
      examples:
      - name: presentExample
        summary: A record that already existed when the stream was opened. Sent during the initial replay.
        payload:
          entryUUID: 2c8e1f3a-7b46-4d6f-9a4d-92ad1e1f4ab2
          syncOp: present
          body:
            id: example.org
            description: Subscribers homed in example.org
            serviceProfile: http://localhost:3000/service/fixedLine/profile/INETG1M
            _url: /realm/example.org
      - name: addExample
        summary: A newly created record. The body has the same shape as the corresponding GET response, plus _url.
        payload:
          entryUUID: 2c8e1f3a-7b46-4d6f-9a4d-92ad1e1f4ab2
          syncOp: add
          body:
            id: example.org
            description: Subscribers homed in example.org
            serviceProfile: http://localhost:3000/service/fixedLine/profile/INETG1M
            _url: /realm/example.org
      - name: modifyExample
        summary: An existing record was changed. The body is the full new state, not a patch.
        payload:
          entryUUID: 2c8e1f3a-7b46-4d6f-9a4d-92ad1e1f4ab2
          syncOp: modify
          body:
            id: example.org
            description: Subscribers homed in example.org
            serviceProfile: http://localhost:3000/service/fixedLine/profile/INETG10M
            _url: /realm/example.org
      - name: deleteExample
        summary: A record was removed. The body is a tombstone with only id and _url; the original attributes are not replayed.
        payload:
          entryUUID: 2c8e1f3a-7b46-4d6f-9a4d-92ad1e1f4ab2
          syncOp: delete
          body:
            id: example.org
            _url: /realm/example.org
    subscriberEntry:
      name: entry
      title: Subscriber event
      contentType: application/json
      payload:
        allOf:
        - $ref: '#/components/schemas/entryEnvelope'
        - type: object
          properties:
            body:
              oneOf:
              - $ref: '#/components/schemas/subscriberBody'
              - $ref: '#/components/schemas/tombstone'
      examples:
      - name: presentExample
        summary: A record that already existed when the stream was opened. Sent during the initial replay.
        payload:
          entryUUID: 2c8e1f3a-7b46-4d6f-9a4d-92ad1e1f4ab2
          syncOp: present
          body:
            id: foo+bar
            subscriberId: 0123456789
            serviceStatus: enabled
            serviceId: fixedLine
            serviceProfile: http://localhost:3000/service/fixedLine/profile/INETG1M
            _url: /realm/example.org/subscriber/foo+bar
      - name: addExample
        summary: A newly created record. The body has the same shape as the corresponding GET response, plus _url.
        payload:
          entryUUID: 2c8e1f3a-7b46-4d6f-9a4d-92ad1e1f4ab2
          syncOp: add
          body:
            id: foo+bar
            subscriberId: 0123456789
            serviceStatus: enabled
            serviceId: fixedLine
            serviceProfile: http://localhost:3000/service/fixedLine/profile/INETG1M
            _url: /realm/example.org/subscriber/foo+bar
      - name: modifyExample
        summary: An existing record was changed. The body is the full new state, not a patch.
        payload:
          entryUUID: 2c8e1f3a-7b46-4d6f-9a4d-92ad1e1f4ab2
          syncOp: modify
          body:
            id: foo+bar
            subscriberId: 0123456789
            serviceStatus: suspended
            statusReason: non-payment
            serviceId: fixedLine
            serviceProfile: http://localhost:3000/service/fixedLine/profile/INETG1M
            serviceProfileSuspended: http://localhost:3000/service/fixedLine/profile/suspendedNonPayment
            _url: /realm/example.org/subscriber/foo+bar
      - name: deleteExample
        summary: A record was removed. The body is a tombstone with only id and _url; the original attributes are not replayed.
        payload:
          entryUUID: 2c8e1f3a-7b46-4d6f-9a4d-92ad1e1f4ab2
          syncOp: delete
          body:
            id: foo+bar
            _url: /realm/example.org/subscriber/foo+bar
    subscriberGroupEntry:
      name: entry
      title: Subscriber group event
      contentType: application/json
      payload:
        allOf:
        - $ref: '#/components/schemas/entryEnvelope'
        - type: object
          properties:
            body:
              oneOf:
              - $ref: '#/components/schemas/subscriberGroupBody'
              - $ref: '#/components/schemas/tombstone'
      examples:
      - name: presentExample
        summary: A record that already existed when the stream was opened. Sent during the initial replay.
        payload:
          entryUUID: 2c8e1f3a-7b46-4d6f-9a4d-92ad1e1f4ab2
          syncOp: present
          body:
            id: business-subs
            policy: business
            _url: /group/business-subs
      - name: addExample
        summary: A newly created record. The body has the same shape as the corresponding GET response, plus _url.
        payload:
          entryUUID: 2c8e1f3a-7b46-4d6f-9a4d-92ad1e1f4ab2
          syncOp: add
          body:
            id: business-subs
            policy: business
            _url: /group/business-subs
      - name: modifyExample
        summary: An existing record was changed. The body is the full new state, not a patch.
        payload:
          entryUUID: 2c8e1f3a-7b46-4d6f-9a4d-92ad1e1f4ab2
          syncOp: modify
          body:
            id: business-subs
            policy: business-premium
            _url: /group/business-subs
      - name: deleteExample
        summary: A record was removed. The body is a tombstone with only id and _url; the original attributes are not replayed.
        payload:
          entryUUID: 2c8e1f3a-7b46-4d6f-9a4d-92ad1e1f4ab2
          syncOp: delete
          body:
            id: business-subs
            _url: /group/business-subs
    serviceEntry:
      name: entry
      title: Service event
      contentType: application/json
      payload:
        allOf:
        - $ref: '#/components/schemas/entryEnvelope'
        - type: object
          properties:
            body:
              oneOf:
              - $ref: '#/components/schemas/serviceBody'
              - $ref: '#/components/schemas/tombstone'
      examples:
      - name: presentExample
        summary: A record that already existed when the stream was opened. Sent during the initial replay.
        payload:
          entryUUID: 2c8e1f3a-7b46-4d6f-9a4d-92ad1e1f4ab2
          syncOp: present
          body:
            id: fixedLine
            _url: /service/fixedLine
      - name: addExample
        summary: A newly created record. The body has the same shape as the corresponding GET response, plus _url.
        payload:
          entryUUID: 2c8e1f3a-7b46-4d6f-9a4d-92ad1e1f4ab2
