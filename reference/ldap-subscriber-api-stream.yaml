asyncapi: 3.0.0
info:
  title: SubMan async event streams
  version: '1.0'
  description: |
    Every listing endpoint in `ldap-subscriber-api.yaml` accepts
    `?subscribe=1`, which upgrades the response to `text/event-stream`
    and keeps the connection open. This document describes the events
    delivered on those streams.

    ## Quickstart for an SSE consumer

    ```js
    const es = new EventSource('/realm/example.org/subscriber?subscribe=1');

    es.addEventListener('ready', () => {
      // initial state has finished replaying; subsequent `entry`
      // events are live changes
    });

    es.addEventListener('entry', (e) => {
      const { entryUUID, syncOp, body } = JSON.parse(e.data);
      switch (syncOp) {
        case 'present':                 // existing record (during initial replay)
        case 'add':                     // newly created
        case 'modify':  applyUpsert(body); break;   // full new state in `body`
        case 'delete':  applyDelete(body); break;   // tombstone: only id + _url
      }
    });
    ```

    Two SSE event names are used:

    * `ready` (fires once) marks the boundary between the initial
      replay of existing records and the live change stream. Its
      payload is an empty object.
    * `entry` (fires repeatedly) carries one record. The JSON payload
      tells you what kind of change it represents via `syncOp`, and
      carries the record itself under `body`. Records always include
      a `_url` field pointing at the matching REST resource.

    ## Deletes

    `delete` events carry only `id` and `_url` in `body`, not the
    attributes the record had before it was removed. By the time the
    server emits the event, the record is already gone from the
    underlying directory and its attributes are unrecoverable;
    consumers that need the old state must keep their own copy keyed
    on `entryUUID`.

    ## Renames

    Resources are identified in the URL by their `id`. When an `id`
    changes, that's a rename, and a single underlying rename surfaces
    on the stream as **two** events rather than one `modify`:

    * a `delete` carrying the **old** `id` and `_url`, followed by
    * an `add` carrying the **new** `id`, `_url`, and the full object
      body.

    Both events share the same `entryUUID`, so consumers that want to
    treat a rename as a single logical operation can correlate by
    UUID. Consumers that only care about the current URL of a record
    can treat the pair as an ordinary remove-then-create.

    The same shape applies when a record moves between collections
    (for example, a subscriber re-homed to a different realm): the
    URL changes, so the stream emits `delete` against the old URL
    and `add` against the new one.

    ## Resuming a dropped stream

    Each `entry` is emitted with an SSE `id:` line containing an
    opaque resume cookie. EventSource captures these automatically and
    sends the most recent one back as `Last-Event-ID` when it
    reconnects, so for browser clients no extra code is needed:
    reconnects pick up where the previous stream left off, without
    replaying the initial state.

    Non-EventSource clients should:

    1. remember the last `id:` value they received,
    2. on reconnect, set `Last-Event-ID: <that value>` on the new
       request.

    Cookies are accepted only if they are 1024 bytes or fewer and
    contain no control characters; otherwise the server returns 400
    Bad Request.

    ## Where the events come from

    Internally the stream is driven by an LDAP syncrepl persistent
    search (RFC 4533). The `syncOp` values (`present`, `add`,
    `modify`, `delete`) and the `entryUUID` field come from that
    protocol. Consumers do not need to know about LDAP to use the
    stream: the events describe REST resources, and `body` contains
    the same JSON shape returned by the corresponding GET endpoint.
  contact:
    name: Network RADIUS support
    url: http://www.networkradius.com
    email: support@networkradius.com
  license:
    name: Proprietary
    url: https://freeradius.org
servers:
  default:
    host: localhost:3000
    protocol: sse
    description: |
      The same host that serves the REST API. Streams are reached by
      appending `?subscribe=1` to the corresponding listing endpoint
      (and any of the supported `filter_*` query parameters).
defaultContentType: application/json
channels:
  realmStream:
    address: /realm?subscribe=1
    title: Realm stream
    description: Changes to the set of realms.
    messages:
      ready:
        $ref: '#/components/messages/ready'
      entry:
        $ref: '#/components/messages/realmEntry'
  realmSubscriberStream:
    address: /realm/{realmId}/subscriber?subscribe=1
    title: Subscribers in a realm
    description: Changes to the subscribers that belong to a single realm.
    parameters:
      realmId:
        description: Identifier of the parent realm.
    messages:
      ready:
        $ref: '#/components/messages/ready'
      entry:
        $ref: '#/components/messages/subscriberEntry'
  groupStream:
    address: /group?subscribe=1
    title: Subscriber group stream
    description: Changes to subscriber groups.
    messages:
      ready:
        $ref: '#/components/messages/ready'
      entry:
        $ref: '#/components/messages/subscriberGroupEntry'
  serviceStream:
    address: /service?subscribe=1
    title: Service stream
    description: Changes to top-level service definitions.
    messages:
      ready:
        $ref: '#/components/messages/ready'
      entry:
        $ref: '#/components/messages/serviceEntry'
  serviceProfileStream:
    address: /service/{serviceId}/profile?subscribe=1
    title: Service profiles for a service
    description: Changes to service profiles within one service.
    parameters:
      serviceId:
        description: Identifier of the parent service.
    messages:
      ready:
        $ref: '#/components/messages/ready'
      entry:
        $ref: '#/components/messages/serviceProfileEntry'
  policyStream:
    address: /service/{serviceId}/profile/{profileId}/policy?subscribe=1
    title: Policies for a service profile
    description: Changes to policies attached to a single service profile.
    parameters:
      serviceId:
        description: Identifier of the parent service.
      profileId:
        description: Identifier of the parent service profile.
    messages:
      ready:
        $ref: '#/components/messages/ready'
      entry:
        $ref: '#/components/messages/policyEntry'
  clientStream:
    address: /client?subscribe=1
    title: Client stream
    description: Changes to RADIUS clients.
    messages:
      ready:
        $ref: '#/components/messages/ready'
      entry:
        $ref: '#/components/messages/clientEntry'
  clientPortStream:
    address: /client/{clientId}/port?subscribe=1
    title: Physical ports on a client
    description: Changes to the physical ports configured on one client.
    parameters:
      clientId:
        description: Identifier of the parent client.
    messages:
      ready:
        $ref: '#/components/messages/ready'
      entry:
        $ref: '#/components/messages/portPhysicalEntry'
  clientPortQinqStream:
    address: /client/{clientId}/port/{portId}/qinq?subscribe=1
    title: QinQ taggings on a client port
    description: Changes to the QinQ taggings configured on one physical port of a client.
    parameters:
      clientId:
        description: Identifier of the parent client.
      portId:
        description: Identifier of the parent physical port.
    messages:
      ready:
        $ref: '#/components/messages/ready'
      entry:
        $ref: '#/components/messages/portQinqEntry'
  clientPortStagStream:
    address: /client/{clientId}/port/{portId}/stag?subscribe=1
    title: S-tag taggings on a client port
    description: Changes to the single-tag (S-tag) taggings configured on one physical port of a client.
    parameters:
      clientId:
        description: Identifier of the parent client.
      portId:
        description: Identifier of the parent physical port.
    messages:
      ready:
        $ref: '#/components/messages/ready'
      entry:
        $ref: '#/components/messages/portStagEntry'
  clientGroupStream:
    address: /clientGroup?subscribe=1
    title: Client group stream
    description: Changes to client groups.
    messages:
      ready:
        $ref: '#/components/messages/ready'
      entry:
        $ref: '#/components/messages/clientGroupEntry'
  accessDeviceStream:
    address: /accessDevice?subscribe=1
    title: Access device stream
    description: Changes to access devices.
    messages:
      ready:
        $ref: '#/components/messages/ready'
      entry:
        $ref: '#/components/messages/accessDeviceEntry'
  accessDevicePortStream:
    address: /accessDevice/{accessDeviceId}/port?subscribe=1
    title: Physical ports on an access device
    description: Changes to the physical ports configured on one access device.
    parameters:
      accessDeviceId:
        description: Identifier of the parent access device.
    messages:
      ready:
        $ref: '#/components/messages/ready'
      entry:
        $ref: '#/components/messages/portPhysicalEntry'
  accessDevicePortQinqStream:
    address: /accessDevice/{accessDeviceId}/port/{portId}/qinq?subscribe=1
    title: QinQ taggings on an access device port
    description: Changes to the QinQ taggings configured on one physical port of an access device.
    parameters:
      accessDeviceId:
        description: Identifier of the parent access device.
      portId:
        description: Identifier of the parent physical port.
    messages:
      ready:
        $ref: '#/components/messages/ready'
      entry:
        $ref: '#/components/messages/portQinqEntry'
  accessDevicePortStagStream:
    address: /accessDevice/{accessDeviceId}/port/{portId}/stag?subscribe=1
    title: S-tag taggings on an access device port
    description: Changes to the single-tag (S-tag) taggings configured on one physical port of an access device.
    parameters:
      accessDeviceId:
        description: Identifier of the parent access device.
      portId:
        description: Identifier of the parent physical port.
    messages:
      ready:
        $ref: '#/components/messages/ready'
      entry:
        $ref: '#/components/messages/portStagEntry'
