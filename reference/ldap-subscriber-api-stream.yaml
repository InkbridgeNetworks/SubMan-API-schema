asyncapi: 2.6.0
info:
  title: LDAP subscriber API event streams
  version: '1.0'
  description: |
    Every listing endpoint in `ldap-subscriber-api.yaml` accepts
    `?subscribe=1`, which upgrades the response to `text/event-stream`
    and keeps the connection open. This document describes the events
    delivered on those streams.

    ## Quickstart for an SSE consumer

    ```js
    const es = new EventSource('/realm/example.org/subscriber?subscribe=1');

    es.addEventListener('ready', () => {
      // initial state has finished replaying; subsequent `entry`
      // events are live changes
    });

    es.addEventListener('entry', (e) => {
      const { entryUUID, syncOp, body } = JSON.parse(e.data);
      switch (syncOp) {
        case 'present':                 // existing record (during initial replay)
        case 'add':                     // newly created
        case 'modify':  applyUpsert(body); break;   // full new state in `body`
        case 'delete':  applyDelete(body); break;   // tombstone: only id + _url
      }
    });
    ```

    Two SSE event names are used:

    * `ready` (fires once) marks the boundary between the initial
      replay of existing records and the live change stream. Its
      payload is an empty object.
    * `entry` (fires repeatedly) carries one record. The JSON payload
      tells you what kind of change it represents via `syncOp`, and
      carries the record itself under `body`. Records always include
      a `_url` field pointing at the matching REST resource.

    ## Resuming a dropped stream

    Each `entry` is emitted with an SSE `id:` line containing an
    opaque resume cookie. EventSource captures these automatically and
    sends the most recent one back as `Last-Event-ID` when it
    reconnects, so for browser clients no extra code is needed:
    reconnects pick up where the previous stream left off, without
    replaying the initial state.

    Non-EventSource clients should:

    1. remember the last `id:` value they received,
    2. on reconnect, set `Last-Event-ID: <that value>` on the new
       request.

    Cookies are accepted only if they are 1024 bytes or fewer and
    contain no control characters; otherwise the server returns 400
    Bad Request.

    ## Where the events come from

    Internally the stream is driven by an LDAP syncrepl persistent
    search (RFC 4533). The `syncOp` values (`present`, `add`,
    `modify`, `delete`) and the `entryUUID` field come from that
    protocol. Consumers do not need to know about LDAP to use the
    stream: the events describe REST resources, and `body` contains
    the same JSON shape returned by the corresponding GET endpoint.
  contact:
    name: Network RADIUS support
    url: http://www.networkradius.com
    email: support@networkradius.com
  license:
    name: Proprietary
    url: https://freeradius.org
servers:
  default:
    url: localhost:3000
    protocol: sse
    description: |
      The same host that serves the REST API. Streams are reached by
      appending `?subscribe=1` to the corresponding listing endpoint
      (and any of the supported `filter_*` query parameters).
defaultContentType: application/json
channels:
  /realm?subscribe=1:
    description: Realm stream. Changes to the set of realms.
    subscribe:
      operationId: receiveRealmStream
      summary: Subscribe to realm changes
      message:
        oneOf:
        - $ref: '#/components/messages/ready'
        - $ref: '#/components/messages/realmEntry'
  /realm/{realmId}/subscriber?subscribe=1:
    description: Subscribers in a realm. Changes to the subscribers that belong to a single realm.
    parameters:
      realmId:
        schema:
          type: string
        description: Identifier of the parent realm.
    subscribe:
      operationId: receiveRealmSubscriberStream
      summary: Subscribe to subscriber changes in a realm
      message:
        oneOf:
        - $ref: '#/components/messages/ready'
        - $ref: '#/components/messages/subscriberEntry'
  /group?subscribe=1:
    description: Subscriber group stream. Changes to subscriber groups.
    subscribe:
      operationId: receiveGroupStream
      summary: Subscribe to subscriber-group changes
      message:
        oneOf:
        - $ref: '#/components/messages/ready'
        - $ref: '#/components/messages/subscriberGroupEntry'
  /service?subscribe=1:
    description: Service stream. Changes to top-level service definitions.
    subscribe:
      operationId: receiveServiceStream
      summary: Subscribe to service changes
      message:
        oneOf:
        - $ref: '#/components/messages/ready'
        - $ref: '#/components/messages/serviceEntry'
  /service/{serviceId}/profile?subscribe=1:
    description: Service profiles for a service. Changes to service profiles within one service.
    parameters:
      serviceId:
        schema:
          type: string
        description: Identifier of the parent service.
    subscribe:
      operationId: receiveServiceProfileStream
      summary: Subscribe to service-profile changes for one service
      message:
        oneOf:
        - $ref: '#/components/messages/ready'
        - $ref: '#/components/messages/serviceProfileEntry'
  /service/{serviceId}/profile/{profileId}/policy?subscribe=1:
    description: Policies for a service profile. Changes to policies attached to a single service profile.
    parameters:
      serviceId:
        schema:
          type: string
        description: Identifier of the parent service.
      profileId:
        schema:
          type: string
        description: Identifier of the parent service profile.
    subscribe:
      operationId: receivePolicyStream
      summary: Subscribe to policy changes for one service profile
      message:
        oneOf:
        - $ref: '#/components/messages/ready'
        - $ref: '#/components/messages/policyEntry'
  /client?subscribe=1:
    description: Client stream. Changes to RADIUS clients.
    subscribe:
      operationId: receiveClientStream
      summary: Subscribe to client changes
      message:
        oneOf:
        - $ref: '#/components/messages/ready'
        - $ref: '#/components/messages/clientEntry'
  /client/{clientId}/port?subscribe=1:
    description: Physical ports on a client. Changes to the physical ports configured on one client.
    parameters:
      clientId:
        schema:
          type: string
        description: Identifier of the parent client.
    subscribe:
      operationId: receiveClientPortStream
      summary: Subscribe to physical-port changes on one client
      message:
        oneOf:
        - $ref: '#/components/messages/ready'
        - $ref: '#/components/messages/portPhysicalEntry'
  /client/{clientId}/port/{portId}/qinq?subscribe=1:
    description: QinQ taggings on a client port. Changes to the QinQ taggings configured on one physical port of a client.
    parameters:
      clientId:
        schema:
          type: string
        description: Identifier of the parent client.
      portId:
        schema:
          type: string
        description: Identifier of the parent physical port.
    subscribe:
      operationId: receiveClientPortQinqStream
      summary: Subscribe to QinQ tagging changes on one client port
      message:
        oneOf:
        - $ref: '#/components/messages/ready'
        - $ref: '#/components/messages/portQinqEntry'
  /client/{clientId}/port/{portId}/stag?subscribe=1:
    description: S-tag taggings on a client port. Changes to the single-tag (S-tag) taggings configured on one physical port
      of a client.
    parameters:
      clientId:
        schema:
          type: string
        description: Identifier of the parent client.
      portId:
        schema:
          type: string
        description: Identifier of the parent physical port.
    subscribe:
      operationId: receiveClientPortStagStream
      summary: Subscribe to S-tag tagging changes on one client port
      message:
        oneOf:
        - $ref: '#/components/messages/ready'
        - $ref: '#/components/messages/portStagEntry'
  /clientGroup?subscribe=1:
    description: Client group stream. Changes to client groups.
    subscribe:
      operationId: receiveClientGroupStream
      summary: Subscribe to client-group changes
      message:
        oneOf:
        - $ref: '#/components/messages/ready'
        - $ref: '#/components/messages/clientGroupEntry'
  /accessDevice?subscribe=1:
    description: Access device stream. Changes to access devices.
    subscribe:
      operationId: receiveAccessDeviceStream
      summary: Subscribe to access-device changes
      message:
        oneOf:
        - $ref: '#/components/messages/ready'
        - $ref: '#/components/messages/accessDeviceEntry'
  /accessDevice/{accessDeviceId}/port?subscribe=1:
    description: Physical ports on an access device. Changes to the physical ports configured on one access device.
    parameters:
      accessDeviceId:
        schema:
          type: string
        description: Identifier of the parent access device.
    subscribe:
      operationId: receiveAccessDevicePortStream
      summary: Subscribe to physical-port changes on one access device
      message:
        oneOf:
        - $ref: '#/components/messages/ready'
        - $ref: '#/components/messages/portPhysicalEntry'
  /accessDevice/{accessDeviceId}/port/{portId}/qinq?subscribe=1:
    description: QinQ taggings on an access device port. Changes to the QinQ taggings configured on one physical port of an
      access device.
    parameters:
      accessDeviceId:
        schema:
          type: string
        description: Identifier of the parent access device.
      portId:
        schema:
          type: string
        description: Identifier of the parent physical port.
    subscribe:
      operationId: receiveAccessDevicePortQinqStream
      summary: Subscribe to QinQ tagging changes on one access device port
      message:
        oneOf:
        - $ref: '#/components/messages/ready'
        - $ref: '#/components/messages/portQinqEntry'
  /accessDevice/{accessDeviceId}/port/{portId}/stag?subscribe=1:
    description: S-tag taggings on an access device port. Changes to the single-tag (S-tag) taggings configured on one physical
      port of an access device.
    parameters:
      accessDeviceId:
        schema:
          type: string
        description: Identifier of the parent access device.
      portId:
        schema:
          type: string
        description: Identifier of the parent physical port.
    subscribe:
      operationId: receiveAccessDevicePortStagStream
      summary: Subscribe to S-tag tagging changes on one access device port
      message:
        oneOf:
        - $ref: '#/components/messages/ready'
        - $ref: '#/components/messages/portStagEntry'
components:
  messages:
    ready:
      name: ready
      title: Initial replay complete
      summary: Marks the boundary between initial state replay and live change events.
      contentType: application/json
      payload:
        type: object
        additionalProperties: false
    realmEntry:
      name: entry
      title: Realm event
      contentType: application/json
      payload:
        allOf:
        - $ref: '#/components/schemas/entryEnvelope'
        - type: object
          properties:
            body:
              oneOf:
              - $ref: '#/components/schemas/realmBody'
              - $ref: '#/components/schemas/tombstone'
    subscriberEntry:
      name: entry
      title: Subscriber event
      contentType: application/json
      payload:
        allOf:
        - $ref: '#/components/schemas/entryEnvelope'
        - type: object
          properties:
            body:
              oneOf:
              - $ref: '#/components/schemas/subscriberBody'
              - $ref: '#/components/schemas/tombstone'
    subscriberGroupEntry:
      name: entry
      title: Subscriber group event
      contentType: application/json
      payload:
        allOf:
        - $ref: '#/components/schemas/entryEnvelope'
        - type: object
          properties:
            body:
              oneOf:
              - $ref: '#/components/schemas/subscriberGroupBody'
              - $ref: '#/components/schemas/tombstone'
    serviceEntry:
      name: entry
      title: Service event
      contentType: application/json
      payload:
        allOf:
        - $ref: '#/components/schemas/entryEnvelope'
        - type: object
          properties:
            body:
              oneOf:
              - $ref: '#/components/schemas/serviceBody'
              - $ref: '#/components/schemas/tombstone'
    serviceProfileEntry:
      name: entry
      title: Service profile event
      contentType: application/json
      payload:
        allOf:
        - $ref: '#/components/schemas/entryEnvelope'
        - type: object
          properties:
            body:
              oneOf:
              - $ref: '#/components/schemas/serviceProfileBody'
              - $ref: '#/components/schemas/tombstone'
    policyEntry:
      name: entry
      title: Policy event
      contentType: application/json
      payload:
        allOf:
        - $ref: '#/components/schemas/entryEnvelope'
        - type: object
          properties:
            body:
              oneOf:
              - $ref: '#/components/schemas/policyBody'
              - $ref: '#/components/schemas/tombstone'
    clientEntry:
      name: entry
      title: Client event
      contentType: application/json
      payload:
        allOf:
        - $ref: '#/components/schemas/entryEnvelope'
        - type: object
          properties:
            body:
              oneOf:
              - $ref: '#/components/schemas/clientBody'
              - $ref: '#/components/schemas/tombstone'
    portPhysicalEntry:
      name: entry
      title: Physical port event
      contentType: application/json
      payload:
        allOf:
        - $ref: '#/components/schemas/entryEnvelope'
        - type: object
          properties:
            body:
              oneOf:
              - $ref: '#/components/schemas/portPhysicalBody'
              - $ref: '#/components/schemas/tombstone'
    portQinqEntry:
      name: entry
      title: QinQ tagging event
      contentType: application/json
      payload:
        allOf:
        - $ref: '#/components/schemas/entryEnvelope'
        - type: object
          properties:
            body:
              oneOf:
              - $ref: '#/components/schemas/portQinqBody'
              - $ref: '#/components/schemas/tombstone'
    portStagEntry:
      name: entry
      title: S-tag tagging event
      contentType: application/json
      payload:
        allOf:
        - $ref: '#/components/schemas/entryEnvelope'
        - type: object
          properties:
            body:
              oneOf:
              - $ref: '#/components/schemas/portStagBody'
              - $ref: '#/components/schemas/tombstone'
    clientGroupEntry:
      name: entry
      title: Client group event
      contentType: application/json
      payload:
        allOf:
        - $ref: '#/components/schemas/entryEnvelope'
        - type: object
          properties:
            body:
              oneOf:
              - $ref: '#/components/schemas/clientGroupBody'
              - $ref: '#/components/schemas/tombstone'
    accessDeviceEntry:
      name: entry
      title: Access device event
      contentType: application/json
      payload:
        allOf:
        - $ref: '#/components/schemas/entryEnvelope'
        - type: object
          properties:
            body:
              oneOf:
              - $ref: '#/components/schemas/accessDeviceBody'
              - $ref: '#/components/schemas/tombstone'
  schemas:
    entryEnvelope:
      type: object
      required:
      - entryUUID
      - syncOp
      - body
      properties:
        entryUUID:
          type: string
          description: Stable identifier for the record, persistent across updates.
        syncOp:
          type: string
          enum:
          - present
          - add
          - modify
          - delete
          description: |
            What kind of event this is.

            * `present` is sent for every record that already existed
              when the stream was opened. Treat as an upsert.
            * `add` is sent when a new record appears. Treat as an
              insert.
            * `modify` is sent when an existing record changes. `body`
              contains the full new state, not a patch.
            * `delete` is sent when a record is removed. `body`
              contains only `id` and `_url`.
    tombstone:
      type: object
      required:
      - id
      - _url
      description: |
        Stand-in body for `delete` events. Only enough information to
        identify which record went away.
      properties:
        id:
          type: string
        _url:
          type: string
          format: uri
    urlExtension:
      type: object
      required:
      - _url
      properties:
        _url:
          type: string
          format: uri
          description: |
            URL of the corresponding REST resource. Not present in
            normal REST GET responses; added by the stream so clients
            can hand the event straight to a URL-keyed cache.
    realmBody:
      allOf:
      - $ref: ./ldap-subscriber-api.yaml#/components/schemas/realm
      - $ref: '#/components/schemas/urlExtension'
    subscriberBody:
      allOf:
      - $ref: ./ldap-subscriber-api.yaml#/components/schemas/subscriber
      - $ref: '#/components/schemas/urlExtension'
    subscriberGroupBody:
      allOf:
      - $ref: ./ldap-subscriber-api.yaml#/components/schemas/subscriberGroup
      - $ref: '#/components/schemas/urlExtension'
    serviceBody:
      allOf:
      - $ref: ./ldap-subscriber-api.yaml#/components/schemas/service
      - $ref: '#/components/schemas/urlExtension'
    serviceProfileBody:
      allOf:
      - $ref: ./ldap-subscriber-api.yaml#/components/schemas/serviceProfile
      - $ref: '#/components/schemas/urlExtension'
    policyBody:
      allOf:
      - $ref: ./ldap-subscriber-api.yaml#/components/schemas/freeradiusPolicy
      - $ref: '#/components/schemas/urlExtension'
    clientBody:
      allOf:
      - $ref: ./ldap-subscriber-api.yaml#/components/schemas/client
      - $ref: '#/components/schemas/urlExtension'
    clientGroupBody:
      allOf:
      - $ref: ./ldap-subscriber-api.yaml#/components/schemas/clientGroup
      - $ref: '#/components/schemas/urlExtension'
    accessDeviceBody:
      allOf:
      - $ref: ./ldap-subscriber-api.yaml#/components/schemas/accessDevice
      - $ref: '#/components/schemas/urlExtension'
    portPhysicalBody:
      allOf:
      - $ref: ./ldap-subscriber-api.yaml#/components/schemas/portPhysical
      - $ref: '#/components/schemas/urlExtension'
    portQinqBody:
      allOf:
      - $ref: ./ldap-subscriber-api.yaml#/components/schemas/portQinQ
      - $ref: '#/components/schemas/urlExtension'
    portStagBody:
      allOf:
      - $ref: ./ldap-subscriber-api.yaml#/components/schemas/portPhysStag
      - $ref: '#/components/schemas/urlExtension'
