  schemas:
    entryEnvelope:
      type: object
      required:
      - entryUUID
      - syncOp
      - body
      properties:
        entryUUID:
          type: string
          description: Stable identifier for the record, persistent across updates.
        syncOp:
          type: string
          enum:
          - present
          - add
          - modify
          - delete
          description: |
            What kind of event this is.

            * `present` is sent for every record that already existed
              when the stream was opened. Treat as an upsert.
            * `add` is sent when a new record appears. Treat as an
              insert.
            * `modify` is sent when an existing record changes. `body`
              contains the full new state, not a patch.
            * `delete` is sent when a record is removed. `body`
              contains only `id` and `_url`.
    tombstone:
      type: object
      required:
      - id
      - _url
      description: |
        Stand-in body for `delete` events. Only enough information to
        identify which record went away.
      properties:
        id:
          type: string
        _url:
          type: string
          format: uri
    urlExtension:
      type: object
      required:
      - _url
      properties:
        _url:
          type: string
          format: uri
          description: |
            URL of the corresponding REST resource. Not present in
            normal REST GET responses; added by the stream so clients
            can hand the event straight to a URL-keyed cache.
    realmBody:
      allOf:
      - $ref: ./ldap-subscriber-api.yaml#/components/schemas/realm
      - $ref: '#/components/schemas/urlExtension'
    subscriberBody:
      allOf:
      - $ref: ./ldap-subscriber-api.yaml#/components/schemas/subscriber
      - $ref: '#/components/schemas/urlExtension'
    subscriberGroupBody:
      allOf:
      - $ref: ./ldap-subscriber-api.yaml#/components/schemas/subscriberGroup
      - $ref: '#/components/schemas/urlExtension'
    serviceBody:
