info:
  title: LDAP subscriber API for carriers and ISPs
  version: '1.0'
  summary: A Lua-based, lightweight wrapper around OpenLDAP
  description: |-
    This API runs natively in OpenResty/NGINX to provide a high performance restful layer around an LDAP instance.  It should be mostly object agonistic, but has some special endpoints

    ## URL filter encoding

    Several listing endpoints expose `filter_*` query parameters whose value is a URI (for example `filter_serviceProfile`, `filter_portBindingClient`).

    URIs contain characters (`:`, `/`, `?`, `#`, `+`, etc.) that have meaning inside a query string, so the URI has to be percent-encoded before being passed as a filter value. In some cases the URI you want to filter on itself contains percent-encoded characters (because, for example, one of its path segments contains a literal `/` or `+`). When that happens, a single round of encoding is ambiguous: the server cannot tell whether `%2F` in the received value means a `/` in the URI or a literal `%2F` inside one of the URI's path segments.

    To remove the ambiguity, the server uses the following rule:

    * If the first `/` in the value is **literal**, the value is treated as **single-encoded**: one round of percent-decoding is applied, and the result is the URI.
    * If the first `/` in the value is **percent-encoded** (the value begins with something like `http%3A%2F%2F...` or `%2Fpath%2F...`), the server assumes the *whole* value has been encoded twice and applies a second round of percent-decoding before using the result as the URI.

    In short: do not encode the structural slashes of the URI unless you also encoded every other reserved character inside it twice.

    ### Examples

    Single-encoded (first `/` is literal):

    ```
    filter_portBindingClient=http://localhost/client/192.0.2.1
    ```

    Double-encoded (first `/` is `%2F`, every other reserved character is also encoded twice):

    ```
    filter_portBindingClient=http%253A%252F%252Flocalhost%252Fclient%252F192.0.2.1
    ```

    Use the double-encoded form when the URI itself contains a percent-encoded character that you need to preserve (for example a literal `+` inside an RDN value, encoded as `%2B` in the URI). The double encoding survives the outer query-string decode, and the inner decode then yields the original URI with the `%2B` intact.
