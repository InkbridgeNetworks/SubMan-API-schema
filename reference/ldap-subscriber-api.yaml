  /rename:
    post:
      operationId: post-rename
      summary: Rename a resource
      description: |
        Rename a single resource in place.  The backend performs an LDAP `modrdn`, so the entry's `entryUUID` and any child objects are preserved across the operation; only the leaf RDN of its DN changes.

        Supported resource families: `realm`, `client`, `service`, `group`, `clientGroup`, `accessDevice`, and any nested resources reachable through their route trees (e.g. ports under `client` or `accessDevice`, profiles under `service`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - url
              - id
              properties:
                url:
                  type: string
                  format: uri-reference
                  description: Resource path of the object to rename.
                  example: /realm/example.org
                id:
                  type: string
                  description: The new leaf identifier for the resource.  May be URL-encoded; multi-valued RDNs use `value1+value2`.
                  example: example.com
      responses:
        '200':
          description: |
            Renamed.  The response carries a `Location` header pointing at the new resource URL.
          headers:
            Location:
              schema:
                type: string
                format: uri-reference
              description: The new resource URL after rename.
        '400':
          $ref: '#/components/responses/onBadRequest'
        '404':
          $ref: '#/components/responses/onNotFound'
        '405':
          description: Method not allowed.  Returned when the request verb is not `POST`, when the `url` or `id` field is missing from the body, or when the resolved path is a collection rather than a single object.
        '500':
          $ref: '#/components/responses/onInternalServerError'
      tags:
      - Global
    parameters: []
  /:
    get:
      summary: Global parameters and headers
      responses:
        '200':
          $ref: '#/components/responses/permissionsResponse'
      operationId: get-root
      x-stoplight:
        id: awyakbe5d2ujc
      parameters:
      - $ref: '#/components/parameters/timestamps'
      - schema:
          type: boolean
          example: true
        in: header
        name: x-permissions
        description: If true, returns endpoints directly under the current path that the user can access, and their permissions.  Returns
          "permissionsResponse"
      - $ref: '#/components/parameters/subscribe'
      description: "This endpoint demonstrates certain operations which apply globally to all endpoints.  \nThe OpenAPI specification\
        \ is not flexible enough to represent this.\n\nGlobal endpoints are triggered by using a specific header or query\
        \ parameter.\n\nThe documentation for those parameters states the response type that'll be received."
      tags:
      - Global
    parameters: []
components:
  schemas:
    realm:
      title: realm
      x-stoplight:
        id: or81e5rovv950
      type: object
      description: Holds a set of subscriber, and LDAP/RADIUS attributes associated with a given realm
      properties:
        id:
          type: string
          description: The realm ID.  This may map directly with the domain portion in a user's NAI, and can be used to separate
            subscriber belonging to different areas of the business, or to external customers
          example: example.org
        description:
          type: string
          description: A humanly readable description of the realm
          example: example.org subscriber are actually foo subscriber, who we are authenticating on behalf of bar
        serviceProfile:
          type: string
          format: uri
          example: http://192.168.0.1/service/fixedLine/profile/INETG1M
          description: The URI of a serviceProfile object to apply to all subscriber in this realm.  The serviceProfile object
            must exist, and referential integrity will be enforced
    subscriber:
      title: subscriber
      x-stoplight:
        id: 39i82q1wb1101
      type: object
      description: |-
        A subscriber - A user authenticating via the RADIUS service.

        Note: The attributes listed in the definition of the object are a subset of the attributes available.

        Any attribute that's available in the relevant LDAP schema (freeradius-radius.schema, freeradius-dhcpv4.schema, freeradius-dhcpv6.schema, etc...) for the protocol, can be included in POST, PATCH, PUT actions, including generic attributes such as `radiusAttribute`.  Generic attributes take the format `<attribute> <op> <quote><value><quote>` e.g. `Reply-Message := "Welcome user %{User-Name}"`, and can be used to add any attribute allowed in the protocol dictionary.
      properties:
        id:
          type: string
          description: Must be set to the combination of subscriberID '+' serviceId.  This uniquely identifies a subscriber
            object for a particular type of service, e.g. fixedLine vs wireless
          example: 123456789+fixedLine
        subscriberId:
          type: string
          description: A unique (within a realm) identifier for a subscriber
          example: '123456789'
        serviceStatus:
          type: string
          enum:
          - enabled
          - disabled
          - suspended
          description: Whether this subscriber can access the service
        statusReason:
          type: string
          description: Why the subscriber's service was disabled or suspended
        serviceId:
          type: string
          description: The type of access media this subscriber object relates to, e.g. fixedLine, wireless etc... Must match
            a configured service category
          example: fixedLine
        serviceProfile:
          type: string
          format: uri
          description: The URI of a service profile object to apply to the subscriber
          example: http://localhost:3000/service/fixedLine/profile/INETG1M
        serviceProfileSuspended:
          type: string
          description: The URI of a service profile object to apply to the subscriber
          format: uri
          example: http://localhost:3000/service/fixedLine/profile/suspendedNonPayment
        clientGroup:
          type: array
          format: uri
          description: The URI(s) of a clientGroup to restrict subscriber to.  Prevents subscriber from connecting RADIUS
            clients outside of this set of groups
          uniqueItems: true
          items:
            type: string
            example: http://localhost:3000/client-groups/example.org-bngs
            format: uri
        subscriberGroup:
          type: array
          format: uri
          description: The URI of a subscriberGroup object.  Used to apply common sets of RADIUS attributes or serviceProfiles
            to subscriber
          uniqueItems: true
          items:
            type: string
            format: uri
        portBindingClient:
          type: string
          format: uri
          description: URI of the last client the subscriber authenticated via.  Primarily used for Change of Authorisation
            and disconnect messages
          example: http://localhost:3000/client/192.0.2.1
        portBindingIdentifier:
          type: string
          format: uri
          example: http://localhost:3000/client/192.0.2.1/port/DSLAM03-D6-KTP%20atm%200%2F0%2F0%2F44:0.35/qinq/100%2B25
          description: The subscriber's unique circuit ID, either learned or pre-provisioned
        portBindingModified:
          type: string
          format: date-time
          description: When port binding details were last updated
          readOnly: true
        portBinding:
          type: boolean
          description: If true, the subscriber will be unabled to authenticate via any other circuit than the one we learned
            the first time the subscriber authenticated
        subscriberLastDisconnected:
          type: string
          format: date-time
          description: When the subscriber was last disconnected.
        subscriberDisconnect:
          type: string
          enum:
          - 'true'
          - 'false'
          - oneshot
          description: |-
            Per-modification RADIUS behaviour for this subscriber:
              - 'true':    any modification to the entry triggers a Disconnect-Request.
              - 'false':   any modification triggers a CoA-Request.
              - 'oneshot': sends an immediate Disconnect-Request, then reverts to 'false'.
      required:
      - id
      - subscriberId
      - serviceStatus
      - serviceId
      - serviceProfile
    subscriberGroup:
      title: subscriberGroup
      x-stoplight:
        id: 8y76ggnb1sgil
      type: object
      description: A group of subscriber, used to apply RADIUS attribute overrides to subsets of subscriber
      properties:
        id:
          type: string
          description: A unique identifier for the subscriberGroup
        policy:
          $ref: '#/components/schemas/freeradiusPolicy'
    client:
      title: client
      x-stoplight:
        id: zhddk66aypm1a
      type: object
      description: An client that is authorized to communicate with the RADIUS service
      properties:
        id:
          type: string
          example: 192.0.2.1
          description: An IP address or subnet (cidr format) that uniquely identifies the RADIUS client
        freeradiusClientShortname:
          type: string
          example: my-test-client
          description: A friendly name that will be shown in logs
        freeradiusClientGroup:
          type: string
          description: What the RADIUS client is (type/make/model)
          example: http://example.com/clientGroup/nokia7750
          format: uri
        freeradiusClientComment:
          type: string
          description: A humanly readable comment associated with the client
          example: This RADIUS client authenticates all subscriber in the foo region of bar
        radiusClientSecret:
          type: string
          example: testing123
          description: The shared secret (pre-shared-key) the RADIUS client will use to communicate with the RADIUS service
          format: password
        radiusClientRequireMa:
          type: boolean
          description: Whether we requires the Message-Authenticator attribute in Access-Requests from this client
        tacacsClientSecret:
          type: string
          example: testing123
          description: The shared key the TACACS client will use to communicate with the TACACS service
          format: password
      required:
      - id
    accessDevice:
      title: accessDevice
      type: object
      description: An accessDevice known to the RADIUS service.  Identical to clients but cannot communicate directly with
        the RADIUS service.
      x-stoplight:
        id: ba9992bc8d39a
      properties:
        id:
          type: string
          example: 192.0.2.1
          description: An IP address or subnet (cidr format) that uniquely identifies the RADIUS client
        freeradiusClientShortname:
          type: string
          example: my-test-client
          description: A friendly name that will be shown in logs
        freeradiusClientType:
          type: string
          description: What the RADIUS client is (type/make/model)
          example: myFirstNAS
        freeradiusClientComment:
          type: string
          description: A humanly readable comment associated with the client
          example: This RADIUS client authenticates all subscriber in the foo region of bar
      required:
      - id
    clientGroup:
      type: object
      title: clientGroup
      x-stoplight:
        id: 5b9nnqawh4d41
      description: A method of binding subscriber to a particular group of RADIUS clients
      deprecated: true
      properties:
        id:
          type: string
          description: The identifier for the clientGroup
          example: group1
      required:
      - id
    service:
      title: service
      x-stoplight:
        id: ly2966j1k5o5v
      type: object
      description: |
        ISPs and carriers often provide multiple services for their subscribers.  In addition to fixed line boardband, ISPs or carriers may provide VoIP, metro wireless or cellular data.

        A service object contains one or more serviceProfiles for a given service.  Each serviceProfile describes a different class-of-service a subscriber cam receive.  Common differentiations between serviceProfiles are upload/download speed restrictions, permitted hours of service, and permitted data transfer quotas.
      properties:
        id:
          type: string
          description: Globally unique identifier for a service
      required:
      - id
    serviceProfile:
      title: serviceProfile
      x-stoplight:
        id: kprv79ox656ep
      type: object
      description: |-
        An abstract definition of a class-of-service a subscriber would receive.  This object holds non-FreeRADIUS attributes which control how a subscriber is authorized/authenticated, and enables/disables additional logic that runs as the subscriber's request is processed.

        This object contains multiple freeradiusPolicy objects (as children) which are the concrete implementation of the serviceProfile.  These freeradiusPolicy objects are indexed by clientGroup and describe how to implement a given serviceProfile for a type of client.
      properties:
        id:
          type: string
          example: INET1M
          description: Identifier for the serviceProfile
        portBinding:
          type: boolean
          description: The default port binding state for any subscriber which uses this serviceProfile
      required:
      - id
    freeradiusPolicy:
      title: freeradiusPolicy
      x-stoplight:
        id: ebjv3rkkgvqou
      type: object
      properties:
        id:
          type: string
      description: |-
        A set of FreeRADIUS attributes and assigment rules which modify attributes in the current request.  A freeradiusPolicy is can be a "concrete" implementation of a serviceProfile.  freeradiusPolicies may also be assigned to individual subscribers or subscriberGroups.

        Note: The attributes listed in the definition of the object are a subset of the attributes available.

        Any attribute that's available in the relevant LDAP schema (freeradius-radius.schema, freeradius-dhcpv4.schema, freeradius-dhcpv6.schema, etc...) for the protocol, can be included in POST, PATCH, PUT actions, including generic attributes such as `radiusAttribute`.  Generic attributes take the format `<attribute> <op> <quote><value><quote>` e.g. `Reply-Message := "Welcome user %{User-Name}"`, and can be used to add any attribute allowed in the protocol dictionary.
      examples:
      - id: alcatel7750
        radiusAttribute: reply.Vendor-Specific.Nokia-SR.Subsc-ID-Str = "%{User-Name}@example.org"
    portQinQ:
      title: portQinQ
      x-stoplight:
        id: fca8d7c555fbe
      type: object
      description: A representation of a QinQ SVLAN/CVLAN virtual port
      properties:
        id:
          type: string
          description: Identifier of this QinQ tagging, in the form `<svlan>+<cvlan>`.
          example: 100+25
        type:
          type: string
          enum:
          - qinq
          pattern: ^qinq$
          example: qinq
          description: Port type must be 'QinQ'
        svlan:
          type: integer
          maximum: 4096
          example: 100
          minimum: 0
          description: QinQ svlan tag
        cvlan:
          type: integer
          maximum: 4096
          minimum: 0
          description: QinQ cvlan tag
          example: 0
        remoteAssociation:
          format: uri
          description: URI of the accessDevice (or other upstream network element) that this port connects to. Used to discover
            the remote end of the link.
          type: string
          example: http://localhost:3000/accessDevice/dslam-03
      required:
      - id
    portPhysical:
      title: portPhysical
      type: object
      description: A representation of a QinQ SVLAN/CVLAN virtual port
      x-stoplight:
        id: c02278ad36343
      properties:
        id:
          type: string
          description: Identifier of this physical port. URL-encoded port name as it appears in the path.
          example: 1%2F2%2F3
        type:
          type: string
          pattern: ^physical$
          example: physical
          description: Port type must be 'physical'
          enum:
          - physical
        port:
          type: string
          example: 2/1/1
          description: Identifier for the physical port
          x-stoplight:
            id: v6eqp8ruallel
        remoteAssociation:
          type: string
          format: uri
          description: URI of the accessDevice (or other upstream network element) that this port connects to. Used to discover
            the remote end of the link.
          example: http://localhost:3000/accessDevice/dslam-03
      required:
      - id
    portPhysStag:
      title: portPhysStag
      x-stoplight:
        id: bcd1szjaaavwb
      type: object
      description: A combination of a physical port identifier and QinQ Stag value
      properties:
        id:
          type: string
          description: Identifier of this S-tag tagging. The S-VLAN as a decimal string.
          example: '100'
        type:
          type: string
          x-stoplight:
            id: z52ttxx8bdrq9
          description: Port type must be 'physStag'
          enum:
          - physStag
        port:
          type: string
          x-stoplight:
            id: y2klzm801t2sk
          description: Identifier for the physical port
        svlan:
          type: integer
          x-stoplight:
            id: onrx2d7xh72ms
          description: QinQ svlan tag
          example: 1
          minimum: 1
          maximum: 4096
        remoteAssociation:
          type: string
          x-stoplight:
            id: y86p1ghln7zpd
          description: URI of the accessDevice (or other upstream network element) that this port connects to. Used to discover
            the remote end of the link.
          example: http://localhost:3000/accessDevice/dslam-03
          format: uri
      required:
      - id
  parameters:
    serviceId:
      name: serviceId
      in: path
      required: true
      schema:
        type: string
        example: fixedLine
      description: Identifier for a service profile category (maps to a service)
    clientId:
      name: clientId
      in: path
      required: true
      schema:
        type: string
      description: Unique identifier for a client (an IPv4/v6 address or prefix)
    clientGroupId:
      name: clientGroupId
      in: path
      required: true
      schema:
        type: string
        example: myFirstNas
      description: Identifier for a concrete class of service profile
    realmId:
      name: realmId
      in: path
      required: true
      schema:
        type: string
        example: example.org
      description: Realm this operation relates to
    compoundSubscriberId:
      name: compoundSubscriberId
      in: path
      required: true
      schema:
        type: string
        example: 123456789+fixedLine
      description: A combination of the subscriber's unique id and the service the account relates to
    profileId:
      name: profileId
      in: path
      required: true
      schema:
        type: string
        example: INETG1M
      description: Identifier for an abstract class of service profile
    subscriberGroupId:
      name: subscriberGroupId
      in: path
      required: true
      schema:
        type: string
      description: Identifier for a group of subscribers
    prune:
      name: prune
      in: query
      required: false
      schema:
        type: boolean
        default: false
      description: If true, delete any child objects (e.g. all the subscribers in a realm).
    timestamps:
      name: timestamps
      in: query
      required: false
      schema:
        type: boolean
        default: false
      description: |
        If true, include the LDAP `createTimestamp` and `modifyTimestamp` operational attributes on each returned object.  Values are RFC 4517 GeneralizedTime in zulu form (`YYYYMMDDHHMMSSZ`, e.g. `20240519143012Z`) and are passed through unchanged from the directory.
    accessDeviceId:
      name: accessDeviceId
      in: path
      required: true
      schema:
        type: string
      description: Unique identifier for a an accessDevice
    portId:
      name: portId
      in: path
      required: true
      schema:
        type: string
      description: Unique identifier for a port, within a client or accessDevice
    policyId:
      name: policyId
      in: path
      required: true
      schema:
        type: string
      description: Identifier for an concrete class of service profile
    filter_serviceProfile:
      name: filter_serviceProfile
      in: query
      required: false
      schema:
        type: string
        format: uri
      description: Filter by serviceProfile URI. See "URL filter encoding" in the API description for how to encode the value.
    filter_subscriberId:
      name: filter_subscriberId
      in: query
      required: false
      schema:
        type: string
      description: Filter by subscriberId (exact match).
    filter_serviceStatus:
      name: filter_serviceStatus
      in: query
      required: false
      schema:
        type: string
        enum:
        - enabled
        - disabled
        - suspended
      description: Filter by serviceStatus.
    filter_serviceId:
      name: filter_serviceId
      in: query
      required: false
      schema:
        type: string
      description: Filter by serviceId (e.g. fixedLine, GPON).
    filter_subscriberGroup:
      name: filter_subscriberGroup
      in: query
      required: false
      schema:
        type: string
        format: uri
      description: Filter by subscriberGroup URI membership. See "URL filter encoding" in the API description for how to encode
        the value.
    filter_clientGroup:
      name: filter_clientGroup
      in: query
      required: false
      schema:
        type: string
        format: uri
      description: Filter by clientGroup URI membership. See "URL filter encoding" in the API description for how to encode
        the value.
    filter_portBindingClient:
      name: filter_portBindingClient
      in: query
      required: false
      schema:
        type: string
        format: uri
      description: Filter by portBindingClient URI. See "URL filter encoding" in the API description for how to encode the
        value.
    filter_portBindingIdentifier:
      name: filter_portBindingIdentifier
      in: query
      required: false
      schema:
        type: string
        format: uri
      description: Filter by portBindingIdentifier URI. See "URL filter encoding" in the API description for how to encode
        the value.
    filter_freeradiusClientShortname:
      name: filter_freeradiusClientShortname
      in: query
      required: false
      schema:
        type: string
      description: Filter by freeradiusClientShortname (exact match).
    filter_freeradiusClientGroup:
      name: filter_freeradiusClientGroup
      in: query
      required: false
      schema:
        type: string
      description: Filter by freeradiusClientGroup (exact match).
    filter_freeradiusClientType:
      name: filter_freeradiusClientType
      in: query
      required: false
      schema:
        type: string
      description: Filter by freeradiusClientType.
    filter_port:
      name: filter_port
      in: query
      required: false
      schema:
        type: string
      description: Filter by port identifier. Value must be URI-encoded.
    filter_remoteAssociation:
      name: filter_remoteAssociation
      in: query
      required: false
      schema:
        type: string
        format: uri
      description: Filter by remoteAssociation URI. The same URL filter encoding rules as for the other URI filters apply;
        see "URL filter encoding" in the API description.
    qinqId:
      name: qinqId
      in: path
      required: true
      schema:
        type: string
        pattern: ^\d+\+\d+$
      description: QinQ tagging identifier in the form `<svlan>+<cvlan>`. The `+` must be URI-encoded as `%2B` in the request
        URL.
      example: 100+25
    svlan:
      name: svlan
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
        maximum: 4094
      description: Outer VLAN (S-VLAN) identifier.
      example: 100
    subscribe:
      name: subscribe
      in: query
      required: false
      schema:
        type: boolean
        default: false
      description: |
        If true, the server upgrades the response to Server-Sent Events (`text/event-stream`).  The initial state is delivered as one or more events, followed by change events as the underlying data mutates.  The connection stays open until the client closes it.
    copy_uri:
      name: copy_uri
      in: query
      required: false
      schema:
        type: string
        format: uri
      description: 'URL of an existing resource to copy into the target of this request. The source must be the same resource
        type as the endpoint being called. The HTTP verb determines what happens with the copy: `POST` creates new objects,
        `PUT` replaces existing objects, `PATCH` modifies existing objects. Pair with `copy_recursive=true` to also copy descendants.
        When `POST` is used, the request body may carry a JSON payload that overrides the destination object''s id.'
    copy_recursive:
      name: copy_recursive
      in: query
      required: false
      schema:
        type: boolean
        default: false
      description: When combined with `copy_uri`, copy the source object and all of its descendants into the target subtree.
        Has no effect if `copy_uri` is not set.
  responses:
    onCreate:
      description: Response on creating a new object
      content:
        application/json:
          schema: {}
      headers:
        Location:
          schema:
            type: string
          description: The URI of the resource that was just created
    onInternalServerError:
      description: An internal error has occurred while talking to one of the backend (LDAP or Postgres). For instance, an
        attribute was missing when creating an object
      content:
        application/json:
          schema:
            type: object
            properties:
              error_msg:
                type: string
                description: Raw error string from the service element which experienced the error
    onSuccess:
      description: Response sent on a successful operation which did not create an object
      content:
        application/json:
          schema: {}
        text/event-stream:
          schema: {}
    onNotFound:
      description: Specified resource not found
      content:
        application/json:
          schema: {}
    onConflict:
      description: The requested operation conflicts with an existing resource (for instance, trying to create a duplicate
        resource) or you are trying to delete a node that has children
      content:
        application/json:
          schema: {}
    onBadRequest:
      description: |
        Can be any of the following:
        - The requested path doesn’t correspond to the schema.
        - Missing or invalid data for POST or PUT operations. Data should always be valid JSON.
        - If data contains URL to another resource, the host part of the URL must be identical to the host data being created/modified.
      content:
        application/json:
          schema: {}
    permissionsResponse:
      description: "This response shows permisssions for children of this endpoint.  \n\nIt only shows permissions for namespaces,\
        \ i.e. fixed objects, it does not show permissions for\nuser created objects.  Permissions should be assumed to apply\
        \ to all user created objects beneath\nthe returned endpoint."
      content:
        application/json:
          schema:
            type: object
            additionalProperties:
              x-stoplight:
                id: sejmivgbh3y7g
              type: array
              minItems: 1
              maxItems: 2
              uniqueItems: true
              items:
                x-stoplight:
                  id: e7yz6nsdxgkln
                enum:
                - read
                - write
                readOnly: true
              readOnly: true
            readOnly: true
          examples:
            Permissions for '/':
              value:
                /realm:
                - read
                - write
                /client:
                - read
            Permissions for '/realm/example':
              value:
                /realm/example/subscriber:
                - read
        text/event-stream:
          schema:
            type: object
            additionalProperties:
              x-stoplight:
                id: sejmivgbh3y7g
              type: array
              minItems: 1
              maxItems: 2
              uniqueItems: true
              items:
                x-stoplight:
                  id: e7yz6nsdxgkln
                enum:
                - read
                - write
                readOnly: true
              readOnly: true
            readOnly: true
    onUnauthorized:
      description: The access token is missing, expired, or invalid.
      content:
        application/json:
          schema:
            type: object
            required:
            - error_msg
            properties:
              error_msg:
                type: string
                x-stoplight:
                  id: l7wa0zxbbp8cz
                default: The access token is missing, expired, or invalid
                description: A description of the authentication error.
      headers:
        WWW-Authenticate:
          schema:
            type: string
          description: Bearer realm="api", error="invalid_token", error_description="The access token is missing or invalid"
    onForbidden:
      description: Example response
      content:
        application/json:
          schema:
            type: object
            required:
            - error_msg
            - required_scope
            properties:
              error_msg:
                type: string
                x-stoplight:
                  id: lzfbavpxancjo
                default: The token does not have the required scope to access this resource
                description: Description of the error
              required_scope:
                type:
                - array
                x-stoplight:
                  id: 3153skj4zfh0q
                description: What scope would have been required to access this resource
                deprecated: true
                items:
                  x-stoplight:
                    id: ml311rivgj4eg
                  type: string
                  example: read:realm
                readOnly: true
  examples: {}
  requestBodies: {}
  securitySchemes:
    AccessToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer access token used to call API.
    OIDC:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://idp.example.com/oauth2/authorize
          tokenUrl: https://idp.example.com/oauth2/token
          scopes:
            read:realm: Read realms
            write:realm: Modify realms
            read:subscriber: Read subscribers and subscriberGroups
            write:subscriber: Modify subscribers and subscriberGroups
            read:service: Read services
            write:service: Modify services
            read:profile: Read profiles, and policies
            write:profile: Modify profiles, and policies
            read:client: Read clients and clientGroups
            write:client: Write clients and clientGroups
            read:accessDevice: Read access devices
            write:accessDevice: Modify access devices
tags:
- name: Abstract profile (serviceProfile)
  description: Endpoints for managing service definitions, i.e. speed tiers or bandwidth caps.
- name: accessDevice
  description: Endpoints for managing accessDevices.  Network elements with policies associated that do not communicate directly
    with the RADIUS service.
- name: Client
  description: Endpoints for managing clients.  Network elements that communicate directly with the service.
- name: Client group
  description: Endpoints for managing groups or categories of client.
- name: Concrete profile (freeradiusProfile)
  description: Endpoints for managing concrete profiles, i.e. sets of attributes which will be returned to the NAS.
- name: Global
  description: Top-level metadata endpoints not scoped to a single resource type.
- name: Realm
  description: Endpoints for managing realms.  Groups of subscribers based on virtual service.
- name: Service
  description: Endpoints for managing broad categories of service, i.e. 'GPON', 'Wireless802.11', ADSL...
- name: Subscriber
  description: Endpoints for managing subscribers.
- name: Subscriber group
  description: Endpoints for managing groups of subscribers.
security:
- OIDC: []
- AccessToken: []
