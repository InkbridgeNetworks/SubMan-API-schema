name: Lint OpenAPI specs

on:
  push:
    branches: [master]
    paths:
      - 'reference/**'
      - '.spectral.mjs'
      - '.stoplight/**'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - 'reference/**'
      - '.spectral.mjs'
      - '.stoplight/**'
      - '.github/workflows/lint.yml'

jobs:
  spectral:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli@^6

      - name: Lint reference/*.yaml
        run: spectral lint --ruleset .spectral.mjs --fail-severity=error 'reference/*.yaml'
