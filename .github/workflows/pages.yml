name: Publish AsyncAPI docs to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'reference/ldap-subscriber-api-stream.yaml'
      - 'reference/ldap-subscriber-api.yaml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Render AsyncAPI HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Generate site
        # Run from reference/ so cross-file $refs in the AsyncAPI doc
        # (e.g. './ldap-subscriber-api.yaml#/components/schemas/subscriber')
        # resolve relative to the AsyncAPI file rather than to cwd.
        run: |
          cd reference
          npx -y @asyncapi/cli@latest generate fromTemplate \
            ldap-subscriber-api-stream.yaml \
            @asyncapi/html-template@latest \
            --output ../_site \
            --force-write

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
